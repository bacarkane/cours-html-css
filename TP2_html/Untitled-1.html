<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie d'image</title>
</head>
<body>
    <h1>Ma galerie d'image</h1>

    <!-- Image 1 : paysage avec dimensions -->
    <h2>Un paysage</h2>
    <img src="Images\paysage.jpg"
      alt="Vue paronamique d'un paysage tropical au coucher du soleil"
      width="600"
      title="Paysage tropical">
    <p>Photo de paysage - largeur fixée à 600 px.</p>

    <!-- Image 2 : logo PNG transparent -->
    <h2>Un logo PNG</h2>
    <img src="Images/logo.png"
      alt="Logo de l'application web"
      width="150"
      height="150">
    <p>Logo PNG avec fond transparent.</p>

    <!-- Image 3 : portrait en tant que lien -->
    <h2>Portrait cliquable</h2>
    <a href="https://pixabay.com/images/download/streetwindy-man-4444765_1920.jpg">
        <img src="Images/portrait.jpg" 
        alt="Portrait - cliquez pour aller sur google"
        width="300">
    </a>
    <p>Cliquer sur la photo pour accéder à Google</p>

    <!-- Image 4 : lien brisé intentionnel (tester alt) -->
    <h2>Image manquante (test alt)</h2>
    <img src="Images/inexistante.jpg" 
        alt="Cette image n'exixte pas - le texte alt s'affiche à sa place"
        width="300">
        
</body>
</html>
